<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>點餐系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  
  
  <style>
    body{font-family:sans-serif;margin:0;background:#f5f5f5;}
    header{background:#06C755;color:#fff;padding:12px;text-align:center;font-size:18px;}
    .menu{padding:10px;}
    .item{background:#fff;margin-bottom:10px;padding:10px;border-radius:8px;}
    .btn{background:#06C755;color:#fff;border:none;padding:6px 10px;border-radius:6px;}
    .cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ccc;}
    .checkout{background:#ff5a5a;color:#fff;border:none;padding:10px;width:100%;border-radius:6px;}
  </style>
</head>

<body>

<header>🍱 點餐系統</header>

<div class="menu" id="menu"></div>

<div class="cart">
  <div id="cartList">尚未選擇商品</div>
  <div id="total">總計 $0</div>
  <button class="checkout" onclick="checkout()">送出訂單</button>
</div>

<script>

/**********************
ENV（重要）
**********************/
const ENV = {
  dev: { API: "DEV_GAS_URL" },
  prod: { API: "https://script.google.com/macros/s/AKfycbwlFlwuQnmvG80a3g9F8Qj3lP_dJfBkRxlUnMMMF9syxVHu9FFsKK5ZhFravUvMk4qT/exec" }
};

const MODE = "prod";
const API = ENV[MODE].API;
const VERSION = "1.0.6";

/**********************
狀態
**********************/
let menuData = [];
let cart = {};
let storeId = "";
let userId = "guest_"+Date.now();

/**********************
🔥 API（統一）
**********************/
// ✅ 替換 index.html 中的 callAPI 函數
async function callAPI(params) {
  const API_URL = ENV[MODE].API; // 請確保此處 URL 包含 /exec 結尾
  
  if (!API_URL || API_URL.includes("YOUR_GAS_URL")) {
    console.error("❌ API URL 未設定或格式錯誤");
    throw new Error("系統設定錯誤，請聯絡管理員");
  }

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      mode: "cors", // 強制開啟 CORS
      headers: {
        "Content-Type": "text/plain;charset=utf-8", // GAS 接收端建議用 text/plain 避免 preflight 問題
      },
      body: JSON.stringify({
        ...params,
        storeId: STORE_ID, // 確保帶入商用 ID
        token: localStorage.getItem("token")
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP Error: ${response.status}`);
    }

    const result = await response.json();
    if (result.status === "error") {
      throw new Error(result.message);
    }
    return result.data;

  } catch (err) {
    console.error("📡 API 請求細節報錯:", err);
    // 針對 Failed to fetch 的具體診斷
    if (err.message === "Failed to fetch") {
      alert("❌ 連線失敗：請檢查網路，或確認 GAS 部署是否設為「所有人」存取");
    } else {
      alert("❌ 系統錯誤：" + err.message);
    }
    throw err;
  }
}

/**********************
初始化
**********************/
/**********************
初始化（修正版）
**********************/
async function init(){

  try{

    // ❗ 不可信任 URL storeId（先保留，但未來要後端驗證）
    const params = new URLSearchParams(location.search);
    storeId = params.get("storeId") || "STORE001";

    // ✅ 統一走 POST
    const res = await callAPI({
      action: "getMenu",
      storeId
    });

    menuData = res.data || [];

    renderMenu();

  }catch(err){

    document.body.innerHTML = `
      ❌ 初始化失敗<br>
      ${err.message}
    `;
  }
}

  
/**********************
渲染菜單
**********************/
function renderMenu(){

  const el = document.getElementById("menu");
  el.innerHTML = "";

  menuData.forEach(item=>{

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div><b>${item.name}</b></div>
      <div>$${item.price}</div>
      <button class="btn" onclick="addToCart('${item.id}')">加入</button>
    `;

    el.appendChild(div);
  });
}

/**********************
購物車
**********************/
function addToCart(id){

  const item = menuData.find(x=>x.id===id);

  if(!cart[id]){
    cart[id] = {...item, qty:0};
  }

  cart[id].qty++;
  renderCart();
}

function renderCart(){

  const list = document.getElementById("cartList");
  const totalEl = document.getElementById("total");

  let html="";
  let total=0;

  Object.values(cart).forEach(i=>{
    html += `${i.name} x${i.qty}<br>`;
    total += i.price * i.qty;
  });

  list.innerHTML = html || "尚未選擇商品";
  totalEl.innerText = "總計 $" + total;
}

/**********************
送出訂單
**********************/
async function checkout(){

  try{

    const items = Object.values(cart);

    if(items.length === 0){
      alert("請先選擇商品");
      return;
    }

    const total = items.reduce((sum,i)=>sum + i.price*i.qty,0);

    await callAPI({
      action:"createOrder",
      storeId,
      userId,
      items,
      total,
      paymentMethod:"CASH"
    });

    alert("✅ 訂單成功");

    cart = {};
    renderCart();

  }catch(err){
    alert("❌ "+err.message);
  }
}

/**********************
啟動
**********************/
init();

</script>

</body>
</html>
