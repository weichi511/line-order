<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>點餐系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">


  
  
  <style>
    body{font-family:sans-serif;margin:0;background:#f5f5f5;}
    header{background:#06C755;color:#fff;padding:12px;text-align:center;font-size:18px;}
    .menu{padding:10px;}
    .item{background:#fff;margin-bottom:10px;padding:10px;border-radius:8px;}
    .btn{background:#06C755;color:#fff;border:none;padding:6px 10px;border-radius:6px;}
    .cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ccc;}
    .checkout{background:#ff5a5a;color:#fff;border:none;padding:10px;width:100%;border-radius:6px;}
  </style>
</head>

<body>

<header>🍱 點餐系統</header>

<div class="menu" id="menu"></div>

<div class="cart">
  <div id="cartList">尚未選擇商品</div>
  <div id="total">總計 $0</div>
  <button class="checkout" onclick="checkout()">送出訂單</button>
</div>

  
<script>

/**********************
ENV（重要）
**********************/
const ENV = {
  dev: { API: "DEV_GAS_URL" },
  prod: { API: "https://script.google.com/macros/s/AKfycbwlFlwuQnmvG80a3g9F8Qj3lP_dJfBkRxlUnMMMF9syxVHu9FFsKK5ZhFravUvMk4qT/exec" }
};

const MODE = "prod";
const API = ENV[MODE].API;
const VERSION = "1.0.6";

/**********************
狀態
**********************/
let menuData = [];
let cart = {};
let storeId = "";
let userId = "guest_"+Date.now();

/**********************
🔥 API（統一）
**********************/
async function callAPI(payload){

  try{

    const res = await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify(payload)
    });

    // 🔥 防止空回應
    if(!res.ok){
      throw new Error("Network response error: " + res.status);
    }

    const text = await res.text();

    if(!text){
      throw new Error("Empty response");
    }

    let json;

    try{
      json = JSON.parse(text);
    }catch(e){
      throw new Error("Invalid JSON: " + text);
    }

    if(json.status !== "ok"){
      throw new Error(json.message || "API error");
    }

    return json;

  }catch(err){
    throw new Error("API FAIL: " + err.message);
  }
}

/**********************
初始化
**********************/
async function init(){

  try{

    const params = new URLSearchParams(location.search);

    // ❗️禁止信任 URL storeId（暫時保留 fallback）
    storeId = params.get("storeId") || "STORE001";

    // ✅ 統一走 POST（避免 CORS 問題）
    const res = await callAPI({
      action: "getMenu",
      storeId
    });

    menuData = res.data || [];

    if(menuData.length === 0){
      throw new Error("菜單為空");
    }

    renderMenu();

  }catch(err){

    document.body.innerHTML = `
      <div style="padding:20px;text-align:center;">
        ❌ 初始化失敗<br><br>
        ${err.message}
      </div>
    `;

  }
}

  
/**********************
渲染菜單
**********************/
function renderMenu(){

  const el = document.getElementById("menu");
  el.innerHTML = "";

  menuData.forEach(item=>{

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div><b>${item.name}</b></div>
      <div>$${item.price}</div>
      <button class="btn" onclick="addToCart('${item.id}')">加入</button>
    `;

    el.appendChild(div);
  });
}

/**********************
購物車
**********************/
function addToCart(id){

  const item = menuData.find(x=>x.id===id);

  if(!cart[id]){
    cart[id] = {...item, qty:0};
  }

  cart[id].qty++;
  renderCart();
}

function renderCart(){

  const list = document.getElementById("cartList");
  const totalEl = document.getElementById("total");

  let html="";
  let total=0;

  Object.values(cart).forEach(i=>{
    html += `${i.name} x${i.qty}<br>`;
    total += i.price * i.qty;
  });

  list.innerHTML = html || "尚未選擇商品";
  totalEl.innerText = "總計 $" + total;
}

/**********************
送出訂單
**********************/
async function checkout(){

  try{

    const items = Object.values(cart);

    if(items.length === 0){
      alert("請先選擇商品");
      return;
    }

    const total = items.reduce((sum,i)=>sum + i.price*i.qty,0);

    await callAPI({
      action:"createOrder",
      storeId,
      userId,
      items,
      total,
      paymentMethod:"CASH"
    });

    alert("✅ 訂單成功");

    cart = {};
    renderCart();

  }catch(err){
    alert("❌ "+err.message);
  }
}

/**********************
啟動
**********************/
init();

</script>

</body>
</html>
