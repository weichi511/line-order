<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LINE 點餐</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.header{background:#06c755;color:#fff;padding:14px;text-align:center;font-weight:bold}
.tabs{display:flex;background:#fff}
.tab{flex:1;padding:10px;text-align:center;border-bottom:2px solid #eee;cursor:pointer}
.active{border-bottom:2px solid #06c755;font-weight:bold}
.container{padding:10px}
.card{background:#fff;border-radius:10px;padding:10px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:center}
.qty button{width:28px;height:28px}
.cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd}
.checkout{background:#ff6b6b;color:#fff;border:none;padding:10px 14px;border-radius:6px}
.empty{color:#999;text-align:center;padding:20px}
</style>
</head>

<body>

<div class="header">🍱 點餐系統</div>

<div class="tabs" id="tabs"></div>

<div class="container" id="menu"></div>

<div class="cart">
  <div id="cartList"></div>
  <div id="total">總計 $0</div>
  <button class="checkout" onclick="checkout()">送出訂單</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzmyB2owt6IByhfzGyHCLq4Akc49_hKwfX1FsOyzrOL7UUW0pXZg3oHkxZXcjO6Pcfl/exec";
const LIFF_ID = "2009489969-hNC94ctJ";

let menuData = [];
let cart = {};
let storeId = "";
let userId = "";
let currentCategory = "";

/******** 初始化 ********/
async function init(){
  const params = new URL(location.href);
  storeId = params.searchParams.get("storeId") || "STORE001";

  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadMenu();
}

/******** 載入菜單 ********/
async function loadMenu(){
  try{
    const res = await fetch(API,{
      method:"POST",
      body: JSON.stringify({action:"getMenu",storeId})
    });

    const json = await res.json();

    console.log("API回傳:", json);

    // 🔥 關鍵修正（雙相容）
    menuData = json.data || json || [];

    if(menuData.length === 0){
      document.getElementById("menu").innerHTML = "<div class='empty'>⚠️ 沒有菜單資料</div>";
      return;
    }

    renderTabs();
    renderMenu();

  }catch(err){
    console.error(err);
    document.getElementById("menu").innerHTML = "<div class='empty'>❌ API錯誤</div>";
  }
}

/******** 分類 ********/
function renderTabs(){

  const categories = [...new Set(
    menuData.map(i => (i.category || "").trim())
  )];

  currentCategory = categories[0];

  let html="";
  categories.forEach(c=>{
    html += `<div class="tab ${c===currentCategory?'active':''}" onclick="switchTab('${c}')">${c}</div>`;
  });

  document.getElementById("tabs").innerHTML = html;
}

function switchTab(c){
  currentCategory = c;
  renderTabs();
  renderMenu();
}

/******** 顯示菜單 ********/
function renderMenu(){

  let html="";

  const list = menuData.filter(i =>
    (i.category || "").trim() === currentCategory
  );

  if(list.length === 0){
    html = "<div class='empty'>⚠️ 此分類沒有商品</div>";
  }else{
    list.forEach(i=>{

      const qty = cart[i.id]?.qty || 0;

      html += `
      <div class="card">
        <div class="row">
          <div>
            <b>${i.name}</b><br>$${i.price}
          </div>
          <div class="qty">
            <button onclick="minus('${i.id}')">-</button>
            ${qty}
            <button onclick="add('${i.id}','${i.name}',${i.price})">+</button>
          </div>
        </div>
      </div>`;
    });
  }

  document.getElementById("menu").innerHTML = html;
  renderCart();
}

/******** 加減 ********/
function add(id,name,price){
  if(!cart[id]) cart[id]={name,price,qty:0};
  cart[id].qty++;
  renderMenu();
}

function minus(id){
  if(!cart[id]) return;
  cart[id].qty--;
  if(cart[id].qty<=0) delete cart[id];
  renderMenu();
}

/******** 購物車 ********/
function renderCart(){

  let total=0, html="";

  Object.values(cart).forEach(i=>{
    total += i.price * i.qty;
    html += `${i.name} x${i.qty} = $${i.price*i.qty}<br>`;
  });

  if(html==="") html="尚未選擇商品";

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = "總計 $" + total;
}

/******** 送出訂單 ********/
async function checkout(){

  const items = Object.values(cart);

  if(items.length===0){
    alert("請先選擇商品");
    return;
  }

  let total = items.reduce((s,i)=>s+i.price*i.qty,0);

  if(!confirm("確認送出訂單？")) return;

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"createOrder",
      storeId,
      userId,
      items,
      total
    })
  });

  alert("訂單完成 🎉");

  cart = {};
  renderMenu();
}

init();
</script>

</body>
</html>
