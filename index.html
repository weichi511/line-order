<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>點餐系統</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f6fa}
.header{background:#00c853;color:#fff;padding:15px;text-align:center;font-size:20px}
.item{background:#fff;margin:10px;padding:15px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
button{padding:5px 10px;border:none;border-radius:5px;cursor:pointer}
.cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd}
.checkout{background:#ff5252;color:#fff;width:100%;padding:10px;border:none;border-radius:5px}
.cancel{background:#999;color:#fff;margin-top:8px}
</style>
</head>

<body>

<div class="header">🍱 點餐系統</div>

<div id="menu"></div>

<div class="cart">
  🛒 <span id="cartCount">0</span> 件　
  💰 $<span id="cartTotal">0</span>
  <button class="checkout">送出訂單</button>
</div>

<div id="orders" style="padding:10px;"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz9f91VMYQ7kF_6UIznGz-GWv5-jQXkFm6rkW60VVHdU1iYDaa8sDvgD6oseVzcNBlh/exec";

let cart = {};
let lastOrders = "";

/************************************************
 * 菜單
 ************************************************/
function renderMenu(menu){
  const el = document.getElementById("menu");
  el.innerHTML = "";

  if(!menu || menu.length === 0){
    el.innerHTML = "❌ 沒有菜單";
    return;
  }

  const group = {};
  menu.forEach(item=>{
    const cat = item.category || "其他";
    if(!group[cat]) group[cat] = [];
    group[cat].push(item);
  });

  Object.keys(group).forEach(cat=>{
    el.innerHTML += `<h3 style="padding:10px;">🍽 ${cat}</h3>`;

    group[cat].forEach(item=>{
      const qty = cart[item.id]?.qty || 0;

      el.innerHTML += `
        <div class="item">
          <div style="display:flex;gap:10px;align-items:center;">
            ${item.image ? `<img src="${item.image}" style="width:60px;height:60px;border-radius:8px;">` : ""}
            <div>
              <b>${item.name}</b><br>
              💰 $${item.price}
            </div>
          </div>

          <div>
            <button onclick="decreaseItem('${item.id}')">➖</button>
            ${qty}
            <button onclick="addItem('${item.id}','${item.name}',${item.price})">➕</button>
          </div>
        </div>
      `;
    });
  });
}

/************************************************
 * 購物車
 ************************************************/
function addItem(id,name,price){
  if(!cart[id]) cart[id]={id,name,price,qty:0};
  cart[id].qty++;
  renderCart();
}

function decreaseItem(id){
  if(!cart[id]) return;
  cart[id].qty--;
  if(cart[id].qty<=0) delete cart[id];
  renderCart();
}

function renderCart(){
  let total=0,count=0;
  Object.values(cart).forEach(i=>{
    total+=i.price*i.qty;
    count+=i.qty;
  });

  document.getElementById("cartCount").innerText=count;
  document.getElementById("cartTotal").innerText=total;
  renderMenu(window.MENU_DATA);
}

/************************************************
 * 載入菜單
 ************************************************/
function loadMenu(){
  const storeId = new URLSearchParams(location.search).get("storeId");

  fetch(API + "?action=getMenu&storeId=" + storeId)
  .then(r=>r.json())
  .then(res=>{
    window.MENU_DATA = res.data;
    renderMenu(res.data);
  });
}

/************************************************
 * 送單
 ************************************************/
function submitOrder(){

  if(Object.keys(cart).length===0){
    alert("請先選商品");
    return;
  }

  const storeId = new URLSearchParams(location.search).get("storeId");

  let userId = localStorage.getItem("userId");
  if(!userId){
    userId="U"+Date.now();
    localStorage.setItem("userId",userId);
  }

  const payload = encodeURIComponent(JSON.stringify({
    action:"createOrder",
    storeId,
    userId,
    items:Object.values(cart)
  }));

  fetch(API + "?data=" + payload)
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="ok"){
      alert("✅ 訂單成功");
      cart={};
      renderCart();
      loadMyOrders();
    }else{
      alert(res.message);
    }
  });
}

/************************************************
 * 取消訂單
 ************************************************/
function cancelOrder(orderId){

  const storeId = new URLSearchParams(location.search).get("storeId");
  const userId = localStorage.getItem("userId");

  if(!confirm("確定取消？")) return;

  const payload = encodeURIComponent(JSON.stringify({
    action:"cancelOrder",
    storeId,
    orderId,
    userId
  }));

  fetch(API + "?data=" + payload)
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="ok"){
      alert("✅ 已取消");
      loadMyOrders();
    }else{
      alert(res.message);
    }
  });
}

/************************************************
 * 訂單
 ************************************************/
function loadMyOrders(){

  const storeId = new URLSearchParams(location.search).get("storeId");
  const userId = localStorage.getItem("userId");
  if(!storeId||!userId) return;

  const payload = encodeURIComponent(JSON.stringify({
    action:"getUserOrders",
    storeId,
    userId
  }));

  fetch(API + "?data=" + payload)
  .then(r=>r.json())
  .then(res=>{

    const el=document.getElementById("orders");

    if(res.status!=="ok"){
      el.innerHTML="❌ 錯誤";
      return;
    }

    if(res.data.length===0){
      el.innerHTML="🪹 尚無訂單";
      return;
    }

    const newData=JSON.stringify(res.data);
    if(newData===lastOrders) return;
    lastOrders=newData;

    el.innerHTML="<h3>📦 我的訂單</h3>";

    res.data.reverse().forEach(o=>{

      let items=[];
      try{items=JSON.parse(o.items);}catch(e){}

      let itemHtml=items.map(i=>`• ${i.name} x${i.qty}`).join("<br>");

      let canCancel=false;
      if(o.status==="PENDING"){
        const diff=(Date.now()-new Date(o.time))/1000;
        if(diff<=120) canCancel=true;
      }

      el.innerHTML+=`
        <div style="
          background:#fff;
          margin:10px;
          padding:15px;
          border-radius:12px;
          border-left:6px solid ${
            o.status==="DONE"?"#00c853":
            o.status==="COOKING"?"#ff9800":
            o.status==="ACCEPTED"?"#673ab7":
            o.status==="CANCELLED"?"#999":
            "#2196f3"
          };
        ">
          🆔 ${o.orderId}<br><br>
          ${itemHtml}<br><br>
          💰 $${o.total}<br>
          🚦 ${o.status}<br>

          ${canCancel ? `<button class="cancel" onclick="cancelOrder('${o.orderId}')">取消訂單</button>`:""}

          <br><small>${new Date(o.time).toLocaleString()}</small>
        </div>
      `;
    });

  });
}

/************************************************
 * INIT
 ************************************************/
loadMenu();
loadMyOrders();
setInterval(loadMyOrders,3000);

document.querySelector(".checkout")
  .addEventListener("click",submitOrder);

</script>

</body>
</html>
