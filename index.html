<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LINE 點餐系統</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
}

.header {
  background:#06c755;
  color:white;
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container {
  padding:12px;
}

.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item-left {
  display:flex;
  align-items:center;
}

.item img {
  width:60px;
  height:60px;
  border-radius:8px;
  margin-right:10px;
}

.name {
  font-weight:bold;
}

.price {
  color:#888;
  font-size:14px;
}

.btn {
  background:#06c755;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

.checkout {
  background:#ff6b6b;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🍱 點餐系統</div>

<div class="container" id="menu"></div>

<div class="cart">
  <div id="total">總計 $0</div>
  <button class="checkout" onclick="checkout()">送出訂單</button>
</div>

<script>
const API = "你的GAS網址";
const LIFF_ID = "你的LIFF_ID";

let cart = [];
let total = 0;
let userId = "";
let storeId = "";

/******** 初始化 ********/
async function init(){

  // 取得 storeId
  const params = new URLSearchParams(location.search);
  storeId = params.get("storeId") || "STORE001";

  // LIFF
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadMenu();
}

/******** 載入菜單 ********/
async function loadMenu(){

  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"getMenu",
      storeId:storeId
    })
  });

  const data = await res.json();

  let html = "";

  data.forEach(i=>{

    const img = i.image || "https://via.placeholder.com/60";

    html += `
      <div class="card">
        <div class="item">
          <div class="item-left">
            <img src="${img}">
            <div>
              <div class="name">${i.name}</div>
              <div class="price">$${i.price}</div>
            </div>
          </div>
          <button class="btn" onclick="add('${i.name}',${i.price})">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("menu").innerHTML = html;
}

/******** 加入購物車 ********/
function add(name, price){
  cart.push({name,price});
  total += price;
  document.getElementById("total").innerText = "總計 $" + total;
}

/******** 送出訂單 ********/
async function checkout(){

  if(cart.length === 0){
    alert("請先選擇商品");
    return;
  }

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"createOrder",
      storeId:storeId,
      userId:userId,
      items:cart,
      total:total
    })
  });

  alert("訂單完成！");

  cart = [];
  total = 0;
  document.getElementById("total").innerText = "總計 $0";
}

init();
</script>

</body>
</html>
