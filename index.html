<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LINE 點餐</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.header{background:#06c755;color:#fff;padding:14px;text-align:center;font-weight:bold}
.tabs{display:flex;background:#fff}
.tab{flex:1;padding:10px;text-align:center;border-bottom:2px solid #eee;cursor:pointer}
.active{border-bottom:2px solid #06c755;font-weight:bold}
.container{padding:10px}
.card{background:#fff;border-radius:10px;padding:10px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:center}
.qty button{width:28px;height:28px}
.cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd}
.checkout{background:#ff6b6b;color:#fff;border:none;padding:10px 14px;border-radius:6px}
.empty{color:#999;text-align:center;padding:20px}
.loading{text-align:center;padding:20px;color:#666}
</style>

</head>

<body>

<div class="header">🍱 點餐系統</div>
<div class="tabs" id="tabs"></div>

<div class="container" id="menu">
  <div class="loading">載入中...</div>
</div>

<div class="cart">
  <div id="cartList">尚未選擇商品</div>
  <div id="total">總計 $0</div>
  <button class="checkout" onclick="checkout()">送出訂單</button>
</div>

<script>

/**********************
🔧 ENV 控制（強制）
**********************/
const ENV = {
  dev: { API: "DEV_GAS_URL" },
  prod: { API: "https://script.google.com/macros/s/AKfycbx5hFwyul06ctwV7NA_Rei-JflOqYUieYHHwK6qw3fg77xfN-NOOpmNm0G9s03h1bIa/exec" }
};

const MODE = "prod";
const API = ENV[MODE].API;
const VERSION = "1.0.5";

const LIFF_ID = "2009489969-hNC94ctJ";

/**********************
🔒 狀態
**********************/
let menuData = [];
let cart = {};
let storeId = "";
let userId = "";
let currentCategory = "";

/**********************
🔐 XSS 防護
**********************/
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

/**********************
🌐 API
**********************/
async function callAPI(payload){

  const token = localStorage.getItem("token") || "";

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      token,
      storeId,
      ...payload
    })
  });

  const json = await res.json();

  if(json.status !== "ok"){
    throw new Error(json.message || "API錯誤");
  }

  return json;
}

/**********************
🚀 初始化
**********************/
async function init(){

  try{

    // ⚠️ storeId 不可信 → 只做傳遞
    const params = new URL(location.href);
    storeId = params.searchParams.get("storeId") || "";

    if(!storeId){
      throw new Error("缺少 storeId");
    }

    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    await loadMenu();

  }catch(err){
    console.error(err);
    document.getElementById("menu").innerHTML =
      "<div class='empty'>❌ 初始化失敗</div>";
  }
}

/**********************
📦 菜單
**********************/
async function loadMenu(){

  try{

    const json = await callAPI({
      action:"getMenu",
      userId
    });

    menuData = Array.isArray(json.data) ? json.data : [];

    if(menuData.length === 0){
      document.getElementById("menu").innerHTML =
        "<div class='empty'>⚠️ 沒有菜單</div>";
      return;
    }

    renderTabs();
    renderMenu();

  }catch(err){
    document.getElementById("menu").innerHTML =
      "<div class='empty'>❌ "+ err.message +"</div>";
  }
}

/**********************
📂 分類
**********************/
function renderTabs(){

  const categories = [...new Set(
    menuData.map(i => (i.category || "").trim()).filter(Boolean)
  )];

  if(!currentCategory) currentCategory = categories[0];

  let html="";

  categories.forEach(c=>{
    html += `<div class="tab ${c===currentCategory?'active':''}" 
      onclick="switchTab(${JSON.stringify(c)})">${escapeHTML(c)}</div>`;
  });

  document.getElementById("tabs").innerHTML = html;
}

function switchTab(c){
  currentCategory = c;
  renderTabs();
  renderMenu();
}

/**********************
🍱 菜單顯示
**********************/
function renderMenu(){

  const list = menuData.filter(i =>
    (i.category || "").trim() === currentCategory
  );

  let html="";

  if(list.length === 0){
    html = "<div class='empty'>⚠️ 此分類無商品</div>";
  }else{
    list.forEach(i=>{

      const qty = cart[i.id]?.qty || 0;

      html += `
      <div class="card">
        <div class="row">
          <div>
            <b>${escapeHTML(i.name)}</b><br>
            $${Number(i.price)||0}
          </div>
          <div class="qty">
            <button onclick="minus('${i.id}')">-</button>
            ${qty}
            <button onclick="add('${i.id}',${JSON.stringify(i.name)},${Number(i.price)})">+</button>
          </div>
        </div>
      </div>`;
    });
  }

  document.getElementById("menu").innerHTML = html;
  renderCart();
}

/**********************
➕➖ 購物
**********************/
function add(id,name,price){
  if(!cart[id]) cart[id]={name,price,qty:0};
  cart[id].qty++;
  renderMenu();
}

function minus(id){
  if(!cart[id]) return;
  cart[id].qty--;
  if(cart[id].qty<=0) delete cart[id];
  renderMenu();
}

/**********************
🧾 購物車
**********************/
function renderCart(){

  let total=0, html="";

  Object.values(cart).forEach(i=>{
    total += i.price * i.qty;
    html += `${escapeHTML(i.name)} x${i.qty} = $${i.price*i.qty}<br>`;
  });

  if(html==="") html="尚未選擇商品";

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = "總計 $" + total;
}

/**********************
💳 結帳
**********************/
async function checkout(){

  const items = Object.values(cart);

  if(items.length===0){
    alert("請選商品");
    return;
  }

  if(!userId){
    alert("請重新登入");
    return;
  }

  const method = confirm("確定=LINEPAY / 取消=現金") ? "LINEPAY" : "CASH";

  if(!confirm("確認送出訂單？")) return;

  try{

    const res = await callAPI({
      action:"createOrder",
      userId,
      items,
      total: items.reduce((s,i)=>s+i.price*i.qty,0),
      paymentMethod: method
    });

    alert("✅ 訂單成功");

    cart = {};
    renderMenu();

  }catch(err){
    alert("❌ " + err.message);
  }
}

init();

</script>

</body>
</html>
