<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>點餐系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  
  
  <style>
    body{font-family:sans-serif;margin:0;background:#f5f5f5;}
    header{background:#06C755;color:#fff;padding:12px;text-align:center;font-size:18px;}
    .menu{padding:10px;}
    .item{background:#fff;margin-bottom:10px;padding:10px;border-radius:8px;}
    .btn{background:#06C755;color:#fff;border:none;padding:6px 10px;border-radius:6px;}
    .cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ccc;}
    .checkout{background:#ff5a5a;color:#fff;border:none;padding:10px;width:100%;border-radius:6px;}
  </style>
</head>

<body>

<header>🍱 點餐系統</header>

<div class="menu" id="menu"></div>

<div class="cart">
  <div id="cartList">尚未選擇商品</div>
  <div id="total">總計 $0</div>
  <button class="checkout" onclick="checkout()">送出訂單</button>
</div>

<script>

/**********************
ENV（重要）
**********************/
const ENV = {
  dev: { API: "DEV_GAS_URL" },
  prod: { API: "https://script.google.com/macros/s/AKfycbwWlodjNu_QcOKiX4dLHNrxWD7kBTlTjlVjqyKIOZ6h7u55xmMNyd8ubjP9SQ14T7QX/exec" }
};

const MODE = "prod";
const API = ENV[MODE].API;
const VERSION = "1.0.6";

/**********************
狀態
**********************/
let menuData = [];
let cart = {};
let storeId = "";
let userId = "guest_"+Date.now();

/**********************
🔥 API（統一）
**********************/
async function callAPI(payload){

  const res = await fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(payload)
  });

  const json = await res.json();

  if(json.status !== "ok"){
    throw new Error(json.message);
  }

  return json;
}

/**********************
初始化
**********************/
async function init(){

  try{

    const params = new URLSearchParams(location.search);
    storeId = params.get("storeId") || "STORE001";

    const url = `${API}?action=getMenu&storeId=${storeId}&t=${Date.now()}`;

    const res = await fetch(url, {
      method: "GET",
      mode: "cors",        // 🔥 強制 CORS
      cache: "no-store"    // 🔥 避免快取
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const json = await res.json();

    if(json.status !== "ok"){
      throw new Error(json.message);
    }

    menuData = json.data;
    renderMenu();

  }catch(err){
    console.error(err);

    document.body.innerHTML = `
      ❌ 初始化失敗<br>
      ${err.message}<br><br>
      👉 API: ${API}
    `;
  }
}

  
/**********************
渲染菜單
**********************/
function renderMenu(){

  const el = document.getElementById("menu");
  el.innerHTML = "";

  menuData.forEach(item=>{

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div><b>${item.name}</b></div>
      <div>$${item.price}</div>
      <button class="btn" onclick="addToCart('${item.id}')">加入</button>
    `;

    el.appendChild(div);
  });
}

/**********************
購物車
**********************/
function addToCart(id){

  const item = menuData.find(x=>x.id===id);

  if(!cart[id]){
    cart[id] = {...item, qty:0};
  }

  cart[id].qty++;
  renderCart();
}

function renderCart(){

  const list = document.getElementById("cartList");
  const totalEl = document.getElementById("total");

  let html="";
  let total=0;

  Object.values(cart).forEach(i=>{
    html += `${i.name} x${i.qty}<br>`;
    total += i.price * i.qty;
  });

  list.innerHTML = html || "尚未選擇商品";
  totalEl.innerText = "總計 $" + total;
}

/**********************
送出訂單
**********************/
async function checkout(){

  try{

    const items = Object.values(cart);

    if(items.length === 0){
      alert("請先選擇商品");
      return;
    }

    const total = items.reduce((sum,i)=>sum + i.price*i.qty,0);

    await callAPI({
      action:"createOrder",
      storeId,
      userId,
      items,
      total,
      paymentMethod:"CASH"
    });

    alert("✅ 訂單成功");

    cart = {};
    renderCart();

  }catch(err){
    alert("❌ "+err.message);
  }
}

/**********************
啟動
**********************/
init();

</script>

</body>
</html>
