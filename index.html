<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>點餐系統</title>

  

<style>
body{font-family:sans-serif;margin:0;background:#f5f6fa}
.header{background:#00c853;color:#fff;padding:15px;text-align:center;font-size:20px}
.item{background:#fff;margin:10px;padding:15px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
button{padding:5px 10px;border:none;border-radius:5px;cursor:pointer}
.cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd}
.checkout{background:#ff5252;color:#fff;width:100%;padding:10px;border:none;border-radius:5px}
</style>
</head>

<body>

  
<div class="header">🍱 點餐系統</div>

<div id="menu"></div>

<div class="cart">
  🛒 <span id="cartCount">0</span> 件　
  💰 $<span id="cartTotal">0</span>
  
  <button class="checkout">送出訂單</button>
</div>

<script>
/************************************************
 * 🔐 ENV（之後你要切 dev/prod）
 ************************************************/
const API = "https://script.google.com/macros/s/AKfycbzt2rUtY4Os3xH8sqd09ybBf__RjY0Wx-y3Or9cRbPaz4_mDIh5BB-rGmCKgmVEBVGW/exec";

  
/************************************************
 * 🧠 CART STATE
 ************************************************/
let cart = {};

/************************************************
 * ➕ 加入商品
 ************************************************/
function addItem(id, name, price){
  if(!cart[id]){
    cart[id] = { id, name, price, qty: 0 };
  }
  cart[id].qty++;
  renderCart();
}

/************************************************
 * ➖ 減少商品
 ************************************************/
function decreaseItem(id){
  if(!cart[id]) return;

  cart[id].qty--;

  if(cart[id].qty <= 0){
    delete cart[id];
  }

  renderCart();
}

/************************************************
 * 🍔 渲染菜單（含 + -）
 ************************************************/
function renderMenu(menu){
  const el = document.getElementById("menu");
  el.innerHTML = "";

  menu.forEach(item=>{
    const qty = cart[item.id]?.qty || 0;

    el.innerHTML += `
      <div class="item">
        <div>
          <b>${item.name}</b><br>
          $${item.price}
        </div>

        <div style="display:flex;align-items:center;gap:8px;">
          <button onclick="decreaseItem('${item.id}')">➖</button>
          <span>${qty}</span>
          <button onclick="addItem('${item.id}','${item.name}',${item.price})">➕</button>
        </div>
      </div>
    `;
  });
}

/************************************************
 * 🧾 渲染購物車
 ************************************************/
function renderCart(){
  let total = 0;
  let count = 0;

  Object.values(cart).forEach(i=>{
    total += i.price * i.qty;
    count += i.qty;
  });

  document.getElementById("cartCount").innerText = count;
  document.getElementById("cartTotal").innerText = total;

  renderMenu(window.MENU_DATA);
}

/************************************************
 * 📥 載入菜單（從 GAS）
 ************************************************/
function loadMenu(){

  const params = new URLSearchParams(window.location.search);
  const storeId = params.get("storeId");

  if(!storeId){
    alert("缺少 storeId");
    return;
  }

  // ✅ 改成 GET（重點）
  fetch(API + "?action=getMenu&storeId=" + storeId)
    .then(res => res.json())
    .then(res => {

      console.log("API:", res);

      if(res.status === "ok" && Array.isArray(res.data)){
        window.MENU_DATA = res.data;
        renderMenu(window.MENU_DATA);
        return;
      }

      alert("菜單載入失敗");
      console.error(res);

    })
    .catch(err=>{
      console.error(err);
      alert("API錯誤");
    });
}
/************************************************
 * 🚀 送出訂單（簡化版）
 ************************************************/
function submitOrder(){

  if(Object.keys(cart).length === 0){
    alert("請先選擇商品");
    return;
  }

  // ✅ 從 URL 拿 storeId
  const params = new URLSearchParams(window.location.search);
  const storeId = params.get("storeId");

  if(!storeId){
    alert("缺少 storeId");
    return;
  }

  // ✅ 建立 userId（最小可用）
  let userId = localStorage.getItem("userId");
  if(!userId){
    userId = "U" + Date.now();
    localStorage.setItem("userId", userId);
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "createOrder",
      storeId: storeId,   // 🔥 必填
      userId: userId,     // 🔥 必填
      items: Object.values(cart)
    })
  })
  .then(res => res.json())
  .then(res => {

    console.log("ORDER:", res); // 🔥 一定要看

    if(res.status === "ok"){
      alert("訂單成功");
      cart = {};
      renderCart();
    }else{
      alert("訂單失敗：" + res.message); // 🔥 顯示真正錯誤
    }

  })
  .catch(err=>{
    console.error(err);
    alert("送出失敗");
  });
}
  

/************************************************
 * INIT
 ************************************************/
loadMenu();

// ✅ 強制綁定按鈕事件（修正 onclick 失效）
document.querySelector(".checkout")
  .addEventListener("click", submitOrder);
</script>

</body>
</html>
