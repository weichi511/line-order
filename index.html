<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>點餐系統</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f6fa}
.header{background:#00c853;color:#fff;padding:15px;text-align:center;font-size:20px}
.item{background:#fff;margin:10px;padding:15px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
button{padding:5px 10px;border:none;border-radius:5px;cursor:pointer}
.cart{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd}
.checkout{background:#ff5252;color:#fff;width:100%;padding:10px;border:none;border-radius:5px}
.cancel{background:#999;color:#fff;margin-top:8px}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="header">🍱 點餐系統</div>

<div id="menu"></div>

<div class="cart">
  🛒 <span id="cartCount">0</span> 件　
  💰 $<span id="cartTotal">0</span>
  <button class="checkout">送出訂單</button>
</div>

<div id="orders" style="padding:10px;"></div>

<script>

/************************************************
🔥 Firebase 初始化（換成你的）
************************************************/
const firebaseConfig = {
  apiKey: "AIzaSyCtesmSyOcYKNAcTUyIxRuSsYdax7kSH-0",
  authDomain: "line-order-saas.firebaseapp.com",
  projectId: "line-order-saas"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/************************************************
 * 狀態
 ************************************************/
let cart = {};
let MENU_DATA = [];

/************************************************
 * 菜單 UI
 ************************************************/
function renderMenu(menu){
  const el = document.getElementById("menu");
  el.innerHTML = "";

  if(!menu || menu.length === 0){
    el.innerHTML = "❌ 沒有菜單";
    return;
  }

  const group = {};
  menu.forEach(item=>{
    const cat = item.category || "其他";
    if(!group[cat]) group[cat] = [];
    group[cat].push(item);
  });

  Object.keys(group).forEach(cat=>{
    el.innerHTML += `<h3 style="padding:10px;">🍽 ${cat}</h3>`;

    group[cat].forEach(item=>{
      const qty = cart[item.id]?.qty || 0;

      el.innerHTML += `
        <div class="item">
          <div style="display:flex;gap:10px;align-items:center;">
            ${item.image ? `<img src="${item.image}" style="width:60px;height:60px;border-radius:8px;">` : ""}
            <div>
              <b>${item.name}</b><br>
              💰 $${item.price}
            </div>
          </div>

          <div>
            <button onclick="decreaseItem('${item.id}')">➖</button>
            ${qty}
            <button onclick="addItem('${item.id}','${item.name}',${item.price})">➕</button>
          </div>
        </div>
      `;
    });
  });
}

/************************************************
 * 購物車
 ************************************************/
function addItem(id,name,price){
  if(!cart[id]) cart[id]={id,name,price,qty:0};
  cart[id].qty++;
  renderCart();
}

function decreaseItem(id){
  if(!cart[id]) return;
  cart[id].qty--;
  if(cart[id].qty<=0) delete cart[id];
  renderCart();
}

function renderCart(){
  let total=0,count=0;
  Object.values(cart).forEach(i=>{
    total+=i.price*i.qty;
    count+=i.qty;
  });

  document.getElementById("cartCount").innerText=count;
  document.getElementById("cartTotal").innerText=total;
  renderMenu(MENU_DATA);
}

/************************************************
 * 載入菜單（Firebase）
 ************************************************/
async function loadMenu(){

  const storeId = new URLSearchParams(location.search).get("storeId");

  const snapshot = await db
    .collection("stores")
    .doc(storeId)
    .collection("menu")
    .get();

  MENU_DATA = snapshot.docs.map(doc=>({
    id: doc.id,
    ...doc.data()
  }));

  renderMenu(MENU_DATA);
}

/************************************************
 * 送單（Firebase）
 ************************************************/
async function submitOrder(){

  if(Object.keys(cart).length===0){
    alert("請先選商品");
    return;
  }

  const storeId = new URLSearchParams(location.search).get("storeId");

  let userId = localStorage.getItem("userId");
  if(!userId){
    userId="U"+Date.now();
    localStorage.setItem("userId",userId);
  }

  await db
    .collection("stores")
    .doc(storeId)
    .collection("orders")
    .add({
      userId,
      items:Object.values(cart),
      total:Object.values(cart).reduce((a,b)=>a+b.price*b.qty,0),
      status:"PENDING",
      time:Date.now()
    });

  alert("✅ 訂單成功");

  cart={};
  renderCart();
}

/************************************************
 * 訂單（🔥即時監聽）
 ************************************************/
function loadMyOrders(){

  const storeId = new URLSearchParams(location.search).get("storeId");
  const userId = localStorage.getItem("userId");

  if(!storeId || !userId) return;

  db.collection("stores")
    .doc(storeId)
    .collection("orders")
    .where("userId","==",userId)
    .onSnapshot(snapshot=>{

      const el = document.getElementById("orders");

      if(snapshot.empty){
        el.innerHTML = "🪹 尚無訂單";
        return;
      }

      el.innerHTML = "<h3>📦 我的訂單（即時）</h3>";

      snapshot.docs.reverse().forEach(doc=>{

        const o = doc.data();
        const items = o.items || [];

        const itemHtml = items
          .map(i=>`• ${i.name} x${i.qty}`)
          .join("<br>");

        const statusMap = {
          PENDING:"🕒 等待中",
          ACCEPTED:"👨‍🍳 已接單",
          COOKING:"🔥 製作中",
          DONE:"✅ 已完成",
          CANCELLED:"❌ 已取消"
        };

        el.innerHTML += `
          <div style="background:#fff;margin:12px;padding:16px;border-radius:16px;">
            <div style="font-weight:bold;">🆔 ${doc.id}</div>
            <div>${statusMap[o.status] || o.status}</div>
            <div style="margin-top:10px;">${itemHtml}</div>
            <div>💰 $${o.total}</div>
            <div style="font-size:12px;color:#888;">
              ${new Date(o.time).toLocaleString()}
            </div>
          </div>
        `;
      });

    });
}

/************************************************
 * INIT
 ************************************************/
loadMenu();
loadMyOrders();

document.querySelector(".checkout")
  .addEventListener("click",submitOrder);

</script>

</body>
</html>
