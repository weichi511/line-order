<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>店家後台</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f6fa}
.header{background:#222;color:#fff;padding:15px;text-align:center}
.order{background:#fff;margin:10px;padding:10px;border-radius:8px}
.item{font-size:14px;margin:3px 0}
.status{margin-top:10px}
button{margin-right:5px;padding:5px 10px;border:none;border-radius:5px}
.new{background:#ffa502}
.doing{background:#1e90ff;color:#fff}
.done{background:#2ed573;color:#fff}
.loginBox{padding:20px}
input{padding:8px;margin-bottom:10px;width:100%}
</style>

</head>

<body>

<!-- 🔐 登入 -->
<div id="loginBox" class="loginBox">
  <h3>店家登入</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">登入</button>
</div>

<!-- 🧾 主畫面 -->
<div id="main" style="display:none;">
  <div class="header">📦 訂單後台</div>
  <div id="orders">載入中...</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVkpidp2cO7J9yJTlLhcDkJu7sODz-1lGOCVy0sZWLZXu7MqySNSFUqu9dp-JdX7pP/exec";

/******** 統一 API（帶 token） ********/
async function callAPI(payload){

  const token = localStorage.getItem("token");
  const storeId = localStorage.getItem("storeId");

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      token,
      storeId,
      ...payload
    })
  });

  return res.json();
}

/******** 🔐 登入 ********/
async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"login",
      email,
      password
    })
  });

  const json = await res.json();

  if(json.status !== "ok"){
    alert("登入失敗");
    return;
  }

  // ⭐ 存 token
  localStorage.setItem("token", json.token);
  localStorage.setItem("storeId", json.storeId);

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("main").style.display = "block";

  loadOrders();
}

/******** 初始化 ********/
function init(){

  const token = localStorage.getItem("token");

  if(token){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadOrders();
  }
}

/******** 載入訂單 ********/
async function loadOrders(){

  const res = await callAPI({
    action:"getOrders"
  });

  if(res.status !== "ok"){
    document.getElementById("orders").innerHTML = "❌ 載入失敗";
    return;
  }

  const list = res.data || [];

  if(list.length === 0){
    document.getElementById("orders").innerHTML = "目前沒有訂單";
    return;
  }

  let html = "";

  list.forEach(o=>{

    let items = [];

    try{
      if(typeof o.items === "string"){
        items = JSON.parse(o.items);
      }else if(Array.isArray(o.items)){
        items = o.items;
      }
    }catch(e){
      items = [];
    }

    let itemHTML = "";

    items.forEach(i=>{
      itemHTML += `<div class="item">${i.name} x${i.qty}</div>`;
    });

    html += `
      <div class="order">
        <div>🕒 ${o.time}</div>

        ${itemHTML}

        <div>💰 $${o.total}</div>

        <div>💳 ${o.paymentMethod || "CASH"} / ${o.paymentStatus || "UNPAID"}</div>

        <div>📦 ${o.status || "NEW"}</div>

        <div class="status">
          <button class="new" onclick="update('${o.orderId}','NEW')">新單</button>
          <button class="doing" onclick="update('${o.orderId}','DOING')">製作中</button>
          <button class="done" onclick="update('${o.orderId}','DONE')">完成</button>
        </div>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

/******** 更新狀態 ********/
async function update(orderId,status){

  await callAPI({
    action:"updateOrderStatus",
    orderId,
    status
  });

  loadOrders();
}

/******** 自動刷新 ********/
setInterval(()=>{
  if(localStorage.getItem("token")){
    loadOrders();
  }
},5000);

init();
</script>

</body>
</html>
