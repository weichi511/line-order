<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>店家後台</title>

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.header{background:#222;color:#fff;padding:15px;text-align:center}
.card{background:#fff;margin:10px;padding:15px;border-radius:10px}
button{margin:3px;padding:5px 10px}
</style>
</head>

<body>

<div class="header">🏪 店家後台</div>

<div id="orders"></div>

<script>
const API = "你的API";

function loadOrders(){

  const storeId = prompt("輸入 storeId");

  const payload = encodeURIComponent(JSON.stringify({
    action:"getOrders",
    storeId
  }));

  fetch(API + "?data=" + payload)
  .then(res=>res.json())
  .then(res=>{

    const el = document.getElementById("orders");
    el.innerHTML = "";

    res.data.reverse().forEach(o=>{

      el.innerHTML += `
        <div class="card">
          🆔 ${o.orderId}<br>
          💰 $${o.total}<br>
          🚦 ${o.status}<br>

          <button onclick="update('${o.orderId}','ACCEPTED')">接單</button>
          <button onclick="update('${o.orderId}','COOKING')">製作</button>
          <button onclick="update('${o.orderId}','DONE')">完成</button>
        </div>
      `;
    });

  });
}

function update(orderId,status){

  const storeId = prompt("storeId");

  const payload = encodeURIComponent(JSON.stringify({
    action:"updateOrderStatus",
    storeId,
    orderId,
    status
  }));

  fetch(API + "?data=" + payload)
  .then(()=>loadOrders());
}

loadOrders();
setInterval(loadOrders,3000);
</script>

</body>
</html>
